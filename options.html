<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>TickTab Settings</title>
  <style>
    /* 1. Default */
    :root {
      --bg-color: #f7f9fc;
      --card-bg-color: #ffffff;
      --text-color: #1f2937;
      --label-color: #4b5563;
      --border-color: #e5e7eb;
      --primary-color: #3b82f6;
      --primary-hover-color: #2563eb;
      --success-color: #10b981;
      --error-color: #ef4444;
      --input-bg-color: #ffffff;
      --shadow-color: rgba(0, 0, 0, 0.05);
    }

    /* 2. Dark Mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #111827;
        --card-bg-color: #1f2937;
        --text-color: #f9fafb;
        --label-color: #9ca3af;
        --border-color: #374151;
        --input-bg-color: #1f2937;
        --primary-color: #3b82f6;
        --primary-hover-color: #60a5fa;
        --shadow-color: rgba(0, 0, 0, 0.4);
      }
    }

    /* 3. Base */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* 4. Container */
    .container {
      background-color: var(--card-bg-color);
      padding: 2.5em;
      border-radius: 16px;
      box-shadow: 0 10px 40px var(--shadow-color);
      width: 100%;
      max-width: 520px;
      border: 1px solid var(--border-color);
      box-sizing: border-box;
      margin: 2em;
    }

    /* 5. Elements */
    h1 {
      font-size: 2em;
      margin-top: 0;
      margin-bottom: 0.2em;
      color: var(--text-color);
      text-align: center;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .description {
      text-align: center;
      color: var(--label-color);
      font-size: 1em;
      margin-bottom: 2em;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 1.5em;
    }

    label {
      display: block;
      font-size: 0.9em;
      color: var(--label-color);
      margin-bottom: 0.6em;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    select,
    input[type="number"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background-color: var(--input-bg-color);
      color: var(--text-color);
      font-size: 1em;
      box-sizing: border-box;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    select:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 20%, transparent);
    }

    .custom-time-container {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 1.5em;
      font-size: 1em;
      font-weight: 600;
      color: #ffffff;
      background-color: var(--primary-color);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }

    button:hover {
      background-color: var(--primary-hover-color);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 1.5em;
      text-align: center;
      font-weight: 500;
      min-height: 1.2em;
      transition: opacity 0.3s ease;
    }
  </style>
</head>

<body>

  <div class="container">
    <div style="display: flex; justify-content: flex-end; margin-bottom: 1em;">
      <select id="langSelect" style="width: auto; padding: 8px; font-size: 0.9em; cursor: pointer; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--input-bg-color); color: var(--text-color);">
        <option value="auto">Auto (Browser)</option>
        <option value="en">English (en)</option>
        <option value="de">Deutsch (de)</option>
        <option value="es">Español (es)</option>
        <option value="fr">Français (fr)</option>
        <option value="ja">日本語 (ja)</option>
        <option value="pt_BR">Português (pt_BR)</option>
        <option value="zh_CN">中文 (zh_CN)</option>
      </select>
    </div>
    <h1 id="title">TickTab Settings</h1>
    <p class="description" id="description">Automatically close inactive tabs after a specified time.</p>

    <div class="form-group">
      <label for="timeSelect" id="labelTime">Close tabs after:</label>
      <select id="timeSelect">
        <option value="1440" id="opt1Day">1 Day</option>
        <option value="4320" id="opt3Days">3 Days</option>
        <option value="10080" id="opt1Week">1 Week</option>
        <option value="20160" id="opt2Weeks">2 Weeks</option>
        <option value="43200" id="opt1Month">1 Month</option>
        <option value="custom" id="optCustom">Custom (Minutes)</option>
      </select>

      <div class="custom-time-container" id="customInputWrapper" style="display: none;">
        <input type="number" id="customMinutes" min="1" max="5256000" placeholder="e.g. 120">
        <span id="labelMinutes">Minutes</span>
      </div>
    </div>

    <button class="btn" id="saveBtn">Save Settings</button>
    <div class="status" id="statusMessage"></div>
  </div>

  <script src="options.js"></script>
</body>

</html>
