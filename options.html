<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ColdTab Settings</title>
  <style>
    /* 1. Default */
    :root {
      --bg-color: #f7f8fa;
      --card-bg-color: #ffffff;
      --text-color: #2c3e50;
      --label-color: #576574;
      --border-color: #dfe4ea;
      --primary-color: #3498db;
      --primary-hover-color: #2980b9;
      --success-color: #2ecc71;
      --error-color: #e74c3c;
      --shadow-color: rgba(0, 0, 0, 0.05);
    }

    /* 2. Dark Mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #363636;
        --card-bg-color: #525252;
        --text-color: #eeeeee;
        --label-color: #c5c5c5;
        --border-color: #707070;
        --shadow-color: rgba(0, 0, 0, 0.2);
      }
    }

    /* 3. Base */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 2em;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* 4. Konfigurator Container */
    .container {
      background-color: var(--card-bg-color);
      padding: 2em;
      border-radius: 12px;
      box-shadow: 0 8px 32px var(--shadow-color);
      width: 100%;
      max-width: 500px;
      border: 1px solid var(--border-color);
    }

    /* 5. Styling für die Elemente */
    h1 {
      font-size: 1.8em;
      margin-top: 0;
      margin-bottom: 0.2em;
      color: var(--text-color);
      text-align: center;
    }

    .description {
      text-align: center;
      color: var(--label-color);
      font-size: 0.9em;
      margin-bottom: 2em;
    }

    .form-group {
      margin-bottom: 1.5em;
    }

    label {
      display: block;
      font-size: 0.9em;
      color: var(--label-color);
      margin-bottom: 0.5em;
      font-weight: 500;
    }

    select,
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: 1em;
      box-sizing: border-box;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    select:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 20%, transparent);
    }

    .custom-time-container {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 1em;
      font-size: 1em;
      font-weight: bold;
      color: #ffffff;
      background-color: var(--primary-color);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background-color: var(--primary-hover-color);
    }

    button:active {
      transform: scale(0.98);
    }

    /* 6. Styling für die Status-Nachricht */
    .status {
      margin-top: 1.5em;
      text-align: center;
      font-weight: 500;
      min-height: 1.2em;
      /* Verhindert, dass das Layout springt */
    }
  </style>
</head>

<body>

  <div class="container">
    <h1 id="title">ColdTab Settings</h1>
    <p class="description" id="description">Automatically close inactive tabs after a specified time.</p>

    <div class="form-group">
      <label for="timeSelect" id="labelTime">Close tabs after:</label>
      <select id="timeSelect">
        <option value="1440" id="opt1Day">1 Day</option>
        <option value="4320" id="opt3Days">3 Days</option>
        <option value="10080" id="opt1Week">1 Week</option>
        <option value="20160" id="opt2Weeks">2 Weeks</option>
        <option value="43200" id="opt1Month">1 Month</option>
        <option value="custom" id="optCustom">Custom (Minutes)</option>
      </select>

      <div class="custom-time-container" id="customInputWrapper" style="display: none;">
        <input type="number" id="customMinutes" min="1" max="5256000" placeholder="e.g. 120">
        <span id="labelMinutes">Minutes</span>
      </div>
    </div>

    <button class="btn" id="saveBtn">Save Settings</button>
    <div class="status" id="statusMessage"></div>
  </div>

  <script src="options.js"></script>
</body>

</html>
