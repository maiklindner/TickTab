<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ColdTab Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f3f4f6;
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
      text-align: center;
      color: #111827;
    }
    .form-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    select, input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .custom-time-container {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
    }
    .custom-time-container input {
      flex: 1;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #2563eb;
    }
    .status {
      margin-top: 16px;
      text-align: center;
      color: #10b981;
      font-weight: 500;
      min-height: 20px;
    }
    .description {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 id="title">ColdTab Settings</h1>
  <p class="description" id="description">Automatically close inactive tabs after a specified time.</p>
  
  <div class="form-group">
    <label for="timeSelect" id="labelTime">Close tabs after:</label>
    <select id="timeSelect">
      <option value="1440" id="opt1Day">1 Day</option>
      <option value="4320" id="opt3Days">3 Days</option>
      <option value="10080" id="opt1Week">1 Week</option>
      <option value="20160" id="opt2Weeks">2 Weeks</option>
      <option value="43200" id="opt1Month">1 Month</option>
      <option value="custom" id="optCustom">Custom (Minutes)</option>
    </select>

    <div class="custom-time-container" id="customInputWrapper" style="display: none;">
      <input type="number" id="customMinutes" min="1" max="5256000" placeholder="e.g. 120">
      <span id="labelMinutes">Minutes</span>
    </div>
  </div>

  <button class="btn" id="saveBtn">Save Settings</button>
  <div class="status" id="statusMessage"></div>
</div>

<script src="options.js"></script>
</body>
</html>
