<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>TickTab</title>
  <link rel="stylesheet" href="options.css">
</head>

<body>

  <div class="container">
    <header>
      <div style="display: flex; justify-content: flex-end; width: 100%; margin-bottom: -1.5em; position: relative; z-index: 10;">
        <select id="langSelect" style="width: auto; padding: 6px; font-size: 0.85em; cursor: pointer; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--input-bg-color); color: var(--text-color);">
          <option value="auto">Auto (Browser)</option>
          <option value="en">English (en)</option>
          <option value="de">Deutsch (de)</option>
          <option value="es">Español (es)</option>
          <option value="fr">Français (fr)</option>
          <option value="ja">日本語 (ja)</option>
          <option value="pt_BR">Português (pt_BR)</option>
          <option value="zh_CN">中文 (zh_CN)</option>
        </select>
      </div>
      <h1 id="titleH1">TickTab</h1>
      <p id="optionsDesc">Automatically close inactive tabs after a specified time.</p>
    </header>

    <main>

    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-title" id="enableTitle">Enable TickTab</div>
        <div class="setting-desc" id="enableDesc">Toggle whether inactive tabs should be closed automatically.</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="masterToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="form-group">
      <label for="timeSelect" id="labelTime">Close tabs after:</label>
      <div style="display: flex; gap: 12px; align-items: center;">
        <select id="timeSelect" style="flex: 2;">
          <option value="1440" id="opt1Day">1 Day</option>
          <option value="4320" id="opt3Days">3 Days</option>
          <option value="10080" id="opt1Week">1 Week</option>
          <option value="20160" id="opt2Weeks">2 Weeks</option>
          <option value="43200" id="opt1Month">1 Month</option>
          <option value="custom" id="optCustom">Custom</option>
        </select>

        <div class="custom-time-container" id="customInputWrapper" style="display: none; flex: 1; margin-top: 0;">
          <input type="number" id="customMinutes" min="1" max="100000" placeholder="e.g. 60" style="flex: 1; margin-bottom: 0;">
          <select id="unitSelect" style="flex: 1; margin-bottom: 0;">
            <option value="1" id="optUnitMinutes">Minutes</option>
            <option value="60" id="optUnitHours">Hours</option>
            <option value="1440" id="optUnitDays">Days</option>
            <option value="10080" id="optUnitWeeks">Weeks</option>
          </select>
        </div>
      </div>
    </div>

    </main>
  </div>

  <script src="options.js"></script>
</body>

</html>
